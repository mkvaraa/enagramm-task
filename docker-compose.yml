services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mt-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_password123"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mt-db-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q ''SELECT 1'' -C -b || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  api:
    build:
      context: ./backend
    container_name: mt-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Server=db,1433;Database=MoneyTransfer;User Id=sa;Password=Your_password123;TrustServerCertificate=True;"
    ports:
      - "5000:8080"

  web:
    build:
      context: ./frontend
    container_name: mt-web
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  mt-db-data:
